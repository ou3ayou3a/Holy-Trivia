<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Holy Trivia · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background: linear-gradient(180deg, #0a0805 0%, #0d0a06 100%);
    color: #e8dfc0;
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    padding: 20px;
  }
  
  .container{max-width:1200px;margin:0 auto}
  
  header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 0;border-bottom:1px solid rgba(232,200,74,.2);
    margin-bottom:30px;
  }
  header h1{
    font-family:'Cinzel Decorative',serif;color:#e8c84a;
    font-size:1.8rem;font-weight:700
  }
  header .sub{font-style:italic;color:rgba(232,223,192,.5);font-size:.9rem;margin-top:2px}
  header .actions{display:flex;gap:10px;align-items:center}
  
  .btn{
    background:rgba(232,200,74,.1);border:1px solid rgba(232,200,74,.4);
    color:#e8c84a;font-family:'Cinzel',serif;font-size:.7rem;
    letter-spacing:.1em;text-transform:uppercase;padding:10px 16px;
    cursor:pointer;border-radius:2px;transition:all .15s
  }
  .btn:hover{background:rgba(232,200,74,.2);border-color:#e8c84a}
  .btn.danger{color:#e85050;border-color:rgba(220,60,60,.4)}
  .btn.danger:hover{background:rgba(220,60,60,.1);border-color:#e85050}
  .btn.gold{background:#e8c84a;color:#0a0805;font-weight:600}
  .btn.gold:hover{background:#f0d65a}
  
  /* ═══ Login Screen ═══ */
  .login-screen{
    display:flex;align-items:center;justify-content:center;
    min-height:80vh;
  }
  .login-card{
    background:linear-gradient(180deg,#0d0d0d,#080808);
    border:1px solid rgba(232,200,74,.3);
    border-radius:3px;padding:40px;max-width:420px;width:100%;
    box-shadow:0 0 40px rgba(232,200,74,.15);
    text-align:center;
  }
  .login-card h2{
    font-family:'Cinzel Decorative',serif;color:#e8c84a;
    font-size:1.6rem;margin-bottom:6px
  }
  .login-card .subtitle{
    font-style:italic;color:rgba(232,223,192,.6);
    margin-bottom:24px;font-size:.95rem
  }
  .login-card input{
    width:100%;padding:12px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);color:#e8dfc0;
    font-family:'Crimson Pro',serif;font-size:1rem;margin-bottom:14px;
    border-radius:2px;
  }
  .login-card input:focus{outline:none;border-color:rgba(232,200,74,.5)}
  .login-card .err{color:#e85050;font-style:italic;font-size:.9rem;margin-top:10px;min-height:1.2em}
  
  /* ═══ Dashboard ═══ */
  .grid{display:grid;gap:20px;margin-bottom:24px}
  .grid.cols-4{grid-template-columns:repeat(4,1fr)}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)}
  
  @media(max-width:900px){
    .grid.cols-4{grid-template-columns:repeat(2,1fr)}
    .grid.cols-3{grid-template-columns:1fr}
    .grid.cols-2{grid-template-columns:1fr}
  }
  @media(max-width:500px){
    .grid.cols-4{grid-template-columns:1fr}
  }
  
  .stat{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(232,200,74,.15);
    border-radius:3px;padding:18px;
    transition:border-color .15s
  }
  .stat:hover{border-color:rgba(232,200,74,.4)}
  .stat .label{
    font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.15em;
    color:rgba(232,200,74,.6);text-transform:uppercase;margin-bottom:8px
  }
  .stat .val{
    font-family:'Cinzel Decorative',serif;color:#e8c84a;
    font-size:2.2rem;line-height:1;margin-bottom:4px
  }
  .stat .delta{
    font-family:'Crimson Pro',serif;font-size:.85rem;
    color:rgba(232,223,192,.5);font-style:italic
  }
  .stat.green .val{color:#80e880}
  .stat.red .val{color:#e85050}
  .stat.blue .val{color:#7ec8e3}
  
  .panel{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(232,200,74,.15);
    border-radius:3px;padding:20px;
  }
  .panel h3{
    font-family:'Cinzel',serif;color:#e8c84a;
    font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;
    margin-bottom:16px;padding-bottom:10px;
    border-bottom:1px solid rgba(232,200,74,.15);
  }
  
  /* User table */
  table{width:100%;border-collapse:collapse}
  th,td{
    padding:10px 8px;text-align:left;font-size:.9rem;
    border-bottom:1px solid rgba(255,255,255,.05)
  }
  th{
    font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;
    color:rgba(232,200,74,.5);text-transform:uppercase;
    font-weight:400;
  }
  td{color:#e8dfc0;font-family:'Crimson Pro',serif}
  td.av{font-size:1.4rem;width:36px;line-height:1}
  td.email{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:rgba(232,223,192,.65)}
  td.date{font-size:.78rem;color:rgba(232,223,192,.55);white-space:nowrap}
  td.method{font-size:.7rem;letter-spacing:.05em}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-family:'Cinzel',serif;letter-spacing:.05em;text-transform:uppercase}
  .badge.google{background:rgba(126,200,227,.15);color:#7ec8e3;border:1px solid rgba(126,200,227,.3)}
  .badge.email{background:rgba(232,200,74,.1);color:#e8c84a;border:1px solid rgba(232,200,74,.3)}
  
  /* Chart */
  .chart{display:flex;align-items:flex-end;gap:4px;height:140px;padding-top:10px}
  .chart-bar{
    flex:1;background:linear-gradient(180deg,#e8c84a,#a07e1a);
    min-height:2px;border-radius:2px 2px 0 0;position:relative;
    transition:opacity .15s;cursor:default
  }
  .chart-bar:hover{opacity:.8}
  .chart-bar .tooltip{
    position:absolute;bottom:calc(100% + 4px);left:50%;
    transform:translateX(-50%);
    background:#0a0805;border:1px solid rgba(232,200,74,.4);
    color:#e8c84a;padding:4px 8px;font-size:.7rem;
    font-family:'JetBrains Mono',monospace;border-radius:2px;
    white-space:nowrap;display:none;z-index:10;
  }
  .chart-bar:hover .tooltip{display:block}
  .chart-labels{display:flex;gap:4px;margin-top:6px}
  .chart-label{
    flex:1;text-align:center;font-size:.6rem;
    font-family:'Cinzel',serif;color:rgba(232,223,192,.4);
    letter-spacing:.05em;
    white-space:nowrap;overflow:hidden
  }
  
  /* Bar list */
  .bar-list{display:flex;flex-direction:column;gap:8px}
  .bar-item{display:flex;align-items:center;gap:10px;padding:6px 0}
  .bar-icon{font-size:1.2rem;width:28px;text-align:center}
  .bar-name{flex:1;font-size:.9rem;color:#e8dfc0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-val{font-family:'Cinzel Decorative',serif;color:#e8c84a;font-size:1rem;min-width:36px;text-align:right}
  .bar-fill{
    height:4px;background:rgba(232,200,74,.15);border-radius:2px;
    overflow:hidden;flex:1;max-width:120px
  }
  .bar-fill > div{height:100%;background:linear-gradient(90deg,#a07e1a,#e8c84a);border-radius:2px}
  
  .loading{text-align:center;padding:40px;color:rgba(232,223,192,.4);font-style:italic}
  .error{text-align:center;padding:40px;color:#e85050}
  .empty{text-align:center;padding:24px;color:rgba(232,223,192,.4);font-style:italic;font-size:.9rem}
  
  .section-title{
    font-family:'Cinzel Decorative',serif;color:#e8c84a;
    font-size:1.2rem;margin:24px 0 14px;padding-bottom:6px;
    border-bottom:1px solid rgba(232,200,74,.2)
  }
  
  .footer-quote{
    text-align:center;color:rgba(232,223,192,.3);
    font-style:italic;margin:30px 0 10px;font-size:.85rem
  }
  
  a.user-link{color:#e8c84a;text-decoration:none;border-bottom:1px dotted rgba(232,200,74,.4)}
  a.user-link:hover{color:#f0d65a;border-bottom-color:#e8c84a}
</style>
</head>
<body>

<div class="container">
  
  <!-- LOGIN -->
  <div id="login-view" class="login-screen">
    <div class="login-card">
      <h2>⚙ Admin Access</h2>
      <div class="subtitle">✦ Holy Trivia Dashboard ✦</div>
      <input type="password" id="admin-pass" placeholder="Admin password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="btn gold" onclick="doAdminLogin()" style="width:100%;padding:12px;font-size:.8rem">Sign In</button>
      <div class="err" id="login-err"></div>
      <div style="margin-top:20px;font-size:.78rem;color:rgba(232,223,192,.4);font-style:italic">
        Set <code style="color:#e8c84a;font-family:'JetBrains Mono',monospace">ADMIN_PASSWORD</code> in Railway env vars
      </div>
    </div>
  </div>
  
  <!-- DASHBOARD -->
  <div id="dashboard-view" style="display:none">
    <header>
      <div>
        <h1>Holy Trivia · Admin</h1>
        <div class="sub">✦ Community insights ✦</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="loadStats()">↻ Refresh</button>
        <a href="/" class="btn">← Back to App</a>
        <button class="btn danger" onclick="doAdminLogout()">Sign Out</button>
      </div>
    </header>
    
    <div id="stats-content">
      <div class="loading">Loading stats...</div>
    </div>
    
    <div class="footer-quote">"He determines the number of the stars; he gives to all of them their names." — Psalm 147:4</div>
  </div>
  
</div>

<script>
async function checkAdminStatus() {
  try {
    const res = await fetch('/api/admin/me');
    const data = await res.json();
    if (data.admin) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('dashboard-view').style.display = 'block';
      loadStats();
    }
  } catch (e) { console.error(e); }
}

async function doAdminLogin() {
  const pass = document.getElementById('admin-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!pass) { errEl.textContent = 'Password required'; return; }
  
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Login failed'; return; }
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';
    loadStats();
  } catch (e) {
    errEl.textContent = 'Connection error';
  }
}

async function doAdminLogout() {
  try { await fetch('/api/admin/logout', { method: 'POST' }); } catch (e) {}
  document.getElementById('dashboard-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'flex';
  document.getElementById('admin-pass').value = '';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtRelative(ts) {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  const min = 60000, hr = 3600000, day = 86400000;
  if (diff < min) return 'just now';
  if (diff < hr) return Math.floor(diff/min) + 'm ago';
  if (diff < day) return Math.floor(diff/hr) + 'h ago';
  if (diff < 7*day) return Math.floor(diff/day) + 'd ago';
  return fmtDate(ts);
}

async function loadStats() {
  const content = document.getElementById('stats-content');
  content.innerHTML = '<div class="loading">Loading stats...</div>';
  
  try {
    const res = await fetch('/api/admin/stats');
    if (res.status === 401) {
      doAdminLogout();
      return;
    }
    if (!res.ok) throw new Error('Failed to load');
    const s = await res.json();
    renderStats(s);
  } catch (err) {
    content.innerHTML = `<div class="error">Error: ${err.message}</div>`;
  }
}

function renderStats(s) {
  const u = s.users, a = s.activity, d = s.debates;
  
  // Build outcome map
  const outcomeMap = {};
  (d.byOutcome || []).forEach(o => outcomeMap[o.outcome || 'ongoing'] = o.c);
  const wins = outcomeMap.victory || 0;
  const losses = outcomeMap.surrender || 0;
  const ongoing = outcomeMap.ongoing || 0;
  
  // Chart max
  const chartMax = Math.max(1, ...s.signupChart.map(p => p.count));
  
  document.getElementById('stats-content').innerHTML = `
    
    <div class="section-title">👥 Community</div>
    <div class="grid cols-4">
      <div class="stat">
        <div class="label">Total Users</div>
        <div class="val">${u.total}</div>
        <div class="delta">+${u.newWeek} this week</div>
      </div>
      <div class="stat green">
        <div class="label">Active 24h</div>
        <div class="val">${a.active24h}</div>
        <div class="delta">${u.total > 0 ? Math.round(a.active24h/u.total*100) : 0}% of users</div>
      </div>
      <div class="stat blue">
        <div class="label">Active 7 days</div>
        <div class="val">${a.active7d}</div>
        <div class="delta">${a.active30d} active in 30 days</div>
      </div>
      <div class="stat">
        <div class="label">Live Sessions</div>
        <div class="val">${a.activeSessions}</div>
        <div class="delta">currently signed in</div>
      </div>
    </div>
    
    <div class="grid cols-3">
      <div class="stat">
        <div class="label">New Today</div>
        <div class="val">${u.newToday}</div>
        <div class="delta">signups</div>
      </div>
      <div class="stat">
        <div class="label">Sign-In Methods</div>
        <div class="val">${u.withGoogle} <span style="font-size:.6em;color:rgba(232,223,192,.5)">G</span> · ${u.withPassword} <span style="font-size:.6em;color:rgba(232,223,192,.5)">📧</span></div>
        <div class="delta">${u.bothMethods > 0 ? u.bothMethods + ' have both' : ''}</div>
      </div>
      <div class="stat">
        <div class="label">Newest This Month</div>
        <div class="val">${u.newMonth}</div>
        <div class="delta">last 30 days</div>
      </div>
    </div>
    
    <div class="panel" style="margin-bottom:24px">
      <h3>📈 Signups · Last 14 Days</h3>
      <div class="chart">
        ${s.signupChart.map(p => `
          <div class="chart-bar" style="height:${(p.count/chartMax)*100}%">
            <div class="tooltip">${p.date}: ${p.count}</div>
          </div>
        `).join('')}
      </div>
      <div class="chart-labels">
        ${s.signupChart.map((p, i) => 
          `<div class="chart-label">${i % 2 === 0 ? p.date : '·'}</div>`
        ).join('')}
      </div>
    </div>
    
    <div class="section-title">⚔️ Debate Arena</div>
    <div class="grid cols-4">
      <div class="stat">
        <div class="label">Total Debates</div>
        <div class="val">${d.total}</div>
        <div class="delta">+${d.week} this week</div>
      </div>
      <div class="stat green">
        <div class="label">Victories</div>
        <div class="val">${wins}</div>
        <div class="delta">${d.total > 0 ? Math.round(wins/d.total*100) : 0}% of all</div>
      </div>
      <div class="stat red">
        <div class="label">Surrenders</div>
        <div class="val">${losses}</div>
        <div class="delta">${d.total > 0 ? Math.round(losses/d.total*100) : 0}% of all</div>
      </div>
      <div class="stat blue">
        <div class="label">Ongoing</div>
        <div class="val">${ongoing}</div>
        <div class="delta">unfinished debates</div>
      </div>
    </div>
    
    <div class="grid cols-2">
      <div class="panel">
        <h3>🎭 Most Battled Opponents</h3>
        ${d.topOpponents.length === 0 ? '<div class="empty">No debates yet</div>' : `
          <div class="bar-list">
            ${d.topOpponents.map(o => {
              const max = d.topOpponents[0].c;
              return `
                <div class="bar-item">
                  <div class="bar-icon">${o.opponent_icon}</div>
                  <div class="bar-name">${escapeHtml(o.opponent_name)}</div>
                  <div class="bar-fill"><div style="width:${(o.c/max)*100}%"></div></div>
                  <div class="bar-val">${o.c}</div>
                </div>
              `;
            }).join('')}
          </div>
        `}
      </div>
      
      <div class="panel">
        <h3>⛪ Top Denominations</h3>
        ${d.topDenominations.length === 0 ? '<div class="empty">No debates yet</div>' : `
          <div class="bar-list">
            ${d.topDenominations.map(de => {
              const max = d.topDenominations[0].c;
              return `
                <div class="bar-item">
                  <div class="bar-icon">✝</div>
                  <div class="bar-name">${escapeHtml(de.denomination_name)}</div>
                  <div class="bar-fill"><div style="width:${(de.c/max)*100}%"></div></div>
                  <div class="bar-val">${de.c}</div>
                </div>
              `;
            }).join('')}
          </div>
        `}
      </div>
    </div>
    
    <div class="section-title">📜 Recent Signups</div>
    <div class="panel">
      ${s.recentUsers.length === 0 ? '<div class="empty">No users yet</div>' : `
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Name</th>
              <th>Email</th>
              <th>Method</th>
              <th>Joined</th>
              <th>Last Login</th>
            </tr>
          </thead>
          <tbody>
            ${s.recentUsers.map(u => `
              <tr>
                <td class="av">${u.avatar}</td>
                <td><a class="user-link" href="/" target="_blank">${escapeHtml(u.display_name)}</a></td>
                <td class="email">${escapeHtml(u.email)}</td>
                <td class="method">${u.has_google ? '<span class="badge google">Google</span>' : '<span class="badge email">Email</span>'}</td>
                <td class="date">${fmtDate(u.created_at)}</td>
                <td class="date">${fmtRelative(u.last_login_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `}
    </div>
    
    <div class="section-title">🏆 Most Active Players</div>
    <div class="panel">
      ${s.topPlayers.length === 0 ? '<div class="empty">No active players yet</div>' : `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th></th>
              <th>Player</th>
              <th>Debates</th>
              <th>Wins</th>
              <th>Total Score</th>
              <th>Win Rate</th>
            </tr>
          </thead>
          <tbody>
            ${s.topPlayers.map((p, i) => {
              const rate = p.debate_total > 0 ? Math.round(p.debate_wins/p.debate_total*100) : 0;
              return `
                <tr>
                  <td style="color:rgba(232,200,74,.6);font-family:'Cinzel Decorative',serif">${i + 1}</td>
                  <td class="av">${p.avatar}</td>
                  <td>${escapeHtml(p.display_name)}</td>
                  <td>${p.debate_total}</td>
                  <td style="color:#80e880">${p.debate_wins}</td>
                  <td>${p.debate_score_total}</td>
                  <td>${rate}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
}

// Init
checkAdminStatus();
</script>

</body>
</html>
